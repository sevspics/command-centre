async function hashPIN(pin) {
  const data = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== UTILS =====
function getWeekId() { const d = new Date(), j = new Date(d.getFullYear(),0,1), days = Math.floor((d-j)/864e5); return d.getFullYear()+"-W"+String(Math.ceil((days+j.getDay()+1)/7)).padStart(2,"0"); }
function getLevel(xp) { let l = LEVELS[0]; for (const lv of LEVELS) { if (xp >= lv.xp) l = lv; else break; } return l; }
function getNextLevel(xp) { for (const l of LEVELS) { if (xp < l.xp) return l; } return null; }
function fmtDate(iso) { if (!iso) return ""; return new Date(iso).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}); }
function uid() { return "id-" + Date.now() + "-" + Math.random().toString(36).substr(2,5); }

let saveTimer, historyTimer;
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (!vaultPath) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.ref(vaultPath + '/data').set(state).catch(e => console.warn('Firebase save failed:', e));
  }, 500);
}
function saveHistory() {

  if (!vaultPath) return;
  clearTimeout(historyTimer);
  historyTimer = setTimeout(() => {
    db.ref(vaultPath + '/history').set(history).catch(e => console.warn('Firebase history save failed:', e));
  }, 500);
}
function loadLocal() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) { state = JSON.parse(s); if (!state.sessions) state.sessions = defaultState().sessions; if (!state.commissions) state.commissions = []; if (!state.projects) state.projects = []; if (!state.debriefs) state.debriefs = []; if (!state.dismissedEmails) state.dismissedEmails = []; if (!state.clientEmailMap) state.clientEmailMap = {}; if (!state.emailRules) state.emailRules = []; if (!state.unmatchedMeetings) state.unmatchedMeetings = []; if (!state.knowledgeBase) state.knowledgeBase = []; if (!state.fathomMeta) state.fathomMeta = {}; } else state = defaultState(); } catch(e) { state = defaultState(); }
  try { const h = localStorage.getItem(HISTORY_KEY); if (h) history = JSON.parse(h); } catch(e) {}
  ensureOppFields();
}
function ensureOppFields() {
  if (state.opportunities && Array.isArray(state.opportunities)) {
    state.opportunities.forEach(o => {
      if (!o.contacts) o.contacts = [];
      if (!Array.isArray(o.contacts)) o.contacts = Object.values(o.contacts);
      if (o.lastContact === undefined) o.lastContact = null;
      if (o.nextAction === undefined) o.nextAction = '';
    });
  }
}
function fixArrays(obj) {
  const keys = ['opportunities','inbox','habits','sessions','commissions','waitingFor','somedayMaybe','projects','debriefs','dismissedEmails','emailRules','unmatchedMeetings','knowledgeBase'];
  keys.forEach(k => { if (obj[k] && !Array.isArray(obj[k])) obj[k] = Object.values(obj[k]); });
  if (obj.weeklyActions) {
    Object.keys(obj.weeklyActions).forEach(k => {
      if (obj.weeklyActions[k] && !Array.isArray(obj.weeklyActions[k])) obj.weeklyActions[k] = Object.values(obj.weeklyActions[k]);
    });
  }
  // Fix updates arrays inside projects
  if (obj.projects && Array.isArray(obj.projects)) {
    obj.projects.forEach(p => {
      if (p.updates && !Array.isArray(p.updates)) p.updates = Object.values(p.updates);
      if (!p.updates) p.updates = [];
    });
  }
  // Fix contacts arrays inside opportunities + the meetings array we added for Fathom
  if (obj.opportunities && Array.isArray(obj.opportunities)) {
    obj.opportunities.forEach(o => {
      if (o.contacts && !Array.isArray(o.contacts)) o.contacts = Object.values(o.contacts);
      if (o.meetings && !Array.isArray(o.meetings)) o.meetings = Object.values(o.meetings);
      if (o.meetings && Array.isArray(o.meetings)) {
        o.meetings.forEach(m => {
          if (m.attendees && !Array.isArray(m.attendees)) m.attendees = Object.values(m.attendees);
          if (m.actionItems && !Array.isArray(m.actionItems)) m.actionItems = Object.values(m.actionItems);
          if (m.tags && !Array.isArray(m.tags)) m.tags = Object.values(m.tags);
          if (m.topics && !Array.isArray(m.topics)) m.topics = Object.values(m.topics);
        });
      }
    });
  }
  // Fix Fathom-generated arrays (Firebase serialises empty arrays as undefined)
  ['unmatchedMeetings','knowledgeBase'].forEach(k => {
    if (obj[k] && Array.isArray(obj[k])) {
      obj[k].forEach(m => {
        if (m.attendees && !Array.isArray(m.attendees)) m.attendees = Object.values(m.attendees);
        if (m.actionItems && !Array.isArray(m.actionItems)) m.actionItems = Object.values(m.actionItems);
        if (m.tags && !Array.isArray(m.tags)) m.tags = Object.values(m.tags);
        if (m.topics && !Array.isArray(m.topics)) m.topics = Object.values(m.topics);
      });
    }
  });
}
async function loadFromFirebase() {

    state = fbData;
    const def = defaultState();
    if (!state.sessions) state.sessions = def.sessions;
    if (!state.commissions) state.commissions = [];
    if (!state.weeklyActions) state.weeklyActions = {};
    if (!state.habitLog) state.habitLog = {};

// ===== BACKUP =====
function downloadBackup() {
  const backup = { state, history, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sev-command-centre-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  localStorage.setItem('sev-last-backup', new Date().toISOString().slice(0,10));
}
function checkAutoBackup() {
  if (window.innerWidth < 768) return;
  const today = new Date().toISOString().slice(0,10);
  if (localStorage.getItem('sev-last-backup') !== today) {
    setTimeout(downloadBackup, 2000);
  }
}

function trackStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (state.lastActiveDate !== today) {
    const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
    state.streak = state.lastActiveDate === yesterday ? state.streak + 1 : 1;
    state.lastActiveDate = today;
  }
}

function addXP(amount, label) {
  state.xp = Math.max(0, state.xp + amount); trackStreak(); save();
  const el = document.getElementById("xp-popup");
  const sign = amount >= 0 ? "+" : "";
  el.textContent = sign + amount + " XP - " + label;
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 1500);
  render();
}

function getHealthStatus(lastContact) {
  if (!lastContact) return { color: 'var(--grey)', label: 'No contact', days: null };
  const days = Math.floor((Date.now() - new Date(lastContact).getTime()) / 86400000);
  if (days <= 7) return { color: 'var(--green)', label: days + 'd ago', days: days };
  if (days <= 14) return { color: 'var(--yellow)', label: days + 'd ago', days: days };

function computed() {
  if (!state.weeklyActions) state.weeklyActions = {};
  if (!state.habitLog) state.habitLog = {};
  if (!state.weeklyReview) state.weeklyReview = {};
  if (!state.habits) state.habits = defaultState().habits;
  if (!state.projects) state.projects = [];
  const allActs = []; Object.entries(state.weeklyActions).forEach(([oid,acts]) => { if (acts) (Array.isArray(acts)?acts:Object.values(acts)).forEach(a => allActs.push({...a, oppId: oid})); });
  const doneActs = allActs.filter(a=>a.done).length;
  const habDone = Object.values(state.habitLog).reduce((s,v)=>s+v,0);
  const habTarget = state.habits.reduce((s,h)=>s+h.target,0);
  const revDone = Object.values(state.weeklyReview).filter(Boolean).length;
  const score = Math.round(((doneActs/Math.max(allActs.length,1))*40)+((habDone/Math.max(habTarget,1))*30)+((revDone/REVIEW_ITEMS.length)*30));
  const confirmed = state.opportunities.filter(o=>o.stage>=4).reduce((s,o)=>s+(o.monthlyValue||0),0);
  const pipeline = state.opportunities.filter(o=>o.stage>=1&&o.stage<4).reduce((s,o)=>s+(o.monthlyValue||0),0);
  const projectsRevenue = state.projects.filter(p=>p.category==="professional").reduce((s,p)=>s+(p.monthlyValue||0),0);
  const commBuild = (state.commissions||[]).reduce((s,c)=>s+((c.buildCost*c.myShare)/100),0);
  const commMonthly = (state.commissions||[]).filter(c=>c.status==="active").reduce((s,c)=>s+((c.monthlyRetainer*c.retainerShare)/100),0);
  const sesRev = (state.sessions||[]).reduce((s,x)=>s+x.price,0);
  const sesLeft = (state.sessions||[]).reduce((s,x)=>s+(x.sessionsTotal-x.sessionsUsed),0);
  const activeProjects = state.projects.length;

  // Client health counts
  const activeClients = state.opportunities.filter(o => o.stage === 5);
  let clientsGreen = 0, clientsYellow = 0, clientsRed = 0;
  activeClients.forEach(o => {
    const h = getHealthStatus(o.lastContact);
    if (h.days !== null && h.days <= 7) clientsGreen++;
    else if (h.days !== null && h.days <= 14) clientsYellow++;
    else clientsRed++;
  });

  return { allActs, doneActs, habDone, habTarget, revDone, score, confirmed, pipeline, projectsRevenue, commBuild, commMonthly, sesRev, sesLeft, activeProjects, activeClients: activeClients.length, clientsGreen, clientsYellow, clientsRed };
}

// ===== EMAIL CLASSIFICATION LEARNING =====
// Each "🚫 Junk" click creates a rule. On every render we run the briefing
// through the rules engine, which moves matched emails out of their original
// category and into Noise (or hides them entirely). Rules stay editable in
// the management panel at the bottom of the Gmail tab.

function emailFromAddress(from) {
  const m = (from || '').match(/<([^>]+)>/);
  return (m ? m[1] : (from || '')).toLowerCase().trim();
}

function emailFromDomain(from) {
  const addr = emailFromAddress(from);
  const at = addr.indexOf('@');
  return at >= 0 ? addr.slice(at + 1) : addr;
}

function emailFromName(from) {
  return (from || '').split('<')[0].trim().replace(/"/g, '');
}

/** Build a sensible default rule from a single email — domain match + the
 *  meaningful prefix of its subject. The user can broaden via the rules panel. */
function buildDefaultRule(email) {
  const subj = (email.subject || '').trim();
  let subjectKey = '';
  // If the subject has a natural separator that splits a template prefix from
  // a per-email value (e.g. "You're a perfect fit: L'Oreal"), keep the prefix.
  const colon = subj.indexOf(':');
  const dash = subj.indexOf(' — ');
  const splitAt = colon > 14 ? colon : (dash > 14 ? dash : -1);
  subjectKey = splitAt > 0 ? subj.slice(0, splitAt).trim() : subj.slice(0, 50).trim();

  const fromAddr = emailFromAddress(email.from);
  const fromDom = emailFromDomain(email.from);
  const fromName = emailFromName(email.from) || fromDom;

  return {
    id: uid(),
    name: (subjectKey || fromName).slice(0, 80),
    // Default to the FULL email address (conservative). User can switch to
    // domain via the rules editor for broader matches.
    fromDomainOrEmail: fromAddr || fromDom,
    subjectContains: subjectKey,
    action: 'noise', // 'noise' = reroute to Noise category; 'hide' = drop entirely
    createdAt: new Date().toISOString(),
    sourceThreadId: email.threadId,
    sourceFrom: email.from,
    sourceSubject: subj,
    hitCount: 0,
  };
}

function emailMatchesRule(email, rule) {
  if (!email || !rule) return false;
  if (rule.fromDomainOrEmail) {
    const target = (email.from || '').toLowerCase();
    if (!target.includes(rule.fromDomainOrEmail.toLowerCase())) return false;
  }
  if (rule.subjectContains) {
    const subj = (email.subject || '').toLowerCase();
    if (!subj.includes(rule.subjectContains.toLowerCase())) return false;
  }
  return Boolean(rule.fromDomainOrEmail || rule.subjectContains);
}

/** Returns a NEW gmailData object with rules applied. Does not mutate input.
 *  Updates rule.hitCount on state.emailRules so users see how many emails
 *  each rule has caught (saved on next state change). */
function applyEmailRules(data) {
  if (!data || !data.emails) return data;
  const rules = state.emailRules || [];
  if (!rules.length) return data;

  // Deep-ish copy: shallow clone categories so we can re-bucket.
  const out = Object.assign({}, data);
  out.emails = {};
  for (const cat of Object.keys(data.emails)) out.emails[cat] = [];
  // Make sure Noise exists.
  if (!out.emails['CMD/Noise']) out.emails['CMD/Noise'] = [];

  // Reset per-render hit counters so the displayed numbers reflect *this*
  // briefing, not the lifetime of the rule (which would be misleading).
  rules.forEach(r => { r.hitCount = 0; });

  for (const cat of Object.keys(data.emails)) {
    for (const email of data.emails[cat] || []) {
      const matched = rules.find(r => emailMatchesRule(email, r));
      if (!matched) {
        out.emails[cat].push(email);
        continue;
      }
      matched.hitCount = (matched.hitCount || 0) + 1;
      if (matched.action === 'hide') {
        // Treat as dismissed for this session (not persisted into dismissedEmails).
        continue;
      }
      // Default: move to Noise.
      out.emails['CMD/Noise'].push(Object.assign({}, email, {
        _ruleApplied: matched.id,
        _ruleName: matched.name,
      }));
    }
  }
  return out;
}

/** One-click junk from any email in the Gmail tab. Auto-creates a conservative
 *  rule, fires a best-effort "mark as read" against the Apps Script, and
 *  re-renders. The user can refine the rule in the management panel. */
function gmailMarkJunk(threadId, subjectRaw, fromRaw) {
  if (!gmailData || !gmailData.emails) return;
  // Find the actual email object so we can build the rule from authoritative data.
  let target = null;
  for (const cat of Object.keys(gmailData.emails)) {
    target = (gmailData.emails[cat] || []).find(e => e.threadId === threadId);
    if (target) break;
  }
  if (!target) target = { threadId, subject: subjectRaw, from: fromRaw };

  const rule = buildDefaultRule(target);
  if (!state.emailRules) state.emailRules = [];

  // De-dupe: if a rule with the same from + subject prefix already exists, skip.
  const dupe = state.emailRules.find(r =>
    (r.fromDomainOrEmail || '').toLowerCase() === (rule.fromDomainOrEmail || '').toLowerCase() &&
    (r.subjectContains || '').toLowerCase() === (rule.subjectContains || '').toLowerCase()
  );
  if (!dupe) state.emailRules.unshift(rule);

  // Best-effort: ask the Apps Script to mark the source thread as read in Gmail.
  // If the script doesn't implement this endpoint it'll just no-op.
  markGmailReadAttempt(threadId);

  addXP(XP_VALUES.action, 'Email rule created');
  save();
  render();
}

/** Best-effort POST to the Apps Script asking it to mark a thread as read.
 *  If the script returns 404 or doesn't expose the endpoint, we swallow the
 *  error — the rule still hides the email locally either way. */
async function markGmailReadAttempt(threadId) {
  if (!GMAIL_SCRIPT_URL || !threadId) return;
  try {
    await fetch(GMAIL_SCRIPT_URL + '?action=markRead&threadId=' + encodeURIComponent(threadId), {
      method: 'GET', mode: 'no-cors',
    });
  } catch (e) { /* silent — Apps Script may not handle this action */ }
}

}

      h += '</div>';

  h += '</div></div>';

async function fetchGmailBriefing(hours) {

    const h = hours || 24;

    if (!res.ok) throw new Error('HTTP ' + res.status);
    gmailData = await res.json();
    gmailLastFetched = new Date();
    gmailError = null;

    // Auto-update deal contacts from gmail data
    if (gmailData && gmailData.emails) {
      Object.values(gmailData.emails).flat().forEach(function(email) {
        const senderEmail = (email.from.match(/<([^>]+)>/) || [])[1] || email.from.toLowerCase().trim();
        const dealId = state.clientEmailMap ? state.clientEmailMap[senderEmail] : null;
        if (dealId) {

function gmailAddToPipeline(subject, from) {

function gmailApplyDealUpdate(updateIdx) {

  // Find matching deal in pipeline

  );

  if (deal) {

    deal.notes = update.dealSummary + '\n\n[' + update.meetingDate.substring(0, 10) + '] ' + update.currentStatus + (update.nextSteps ? '\nNext: ' + update.nextSteps : '');
    const stageMap = { 'Lead': 0, 'Proposal Sent': 1, 'In Negotiation': 2, 'Verbal Yes': 3, 'Signed': 4, 'Collecting Revenue': 5 };
    const newStage = stageMap[update.suggestedStage] ?? deal.stage;
    if (newStage > deal.stage) {
      deal.stage = newStage;
      addXP(50, 'Deal Advanced: ' + deal.name);
    }
    if (update.monthlyValue > deal.monthlyValue) deal.monthlyValue = update.monthlyValue;
  } else {
    // Create new deal
    const stageMap = { 'Lead': 0, 'Proposal Sent': 1, 'In Negotiation': 2, 'Verbal Yes': 3, 'Signed': 4, 'Collecting Revenue': 5 };
    state.opportunities.push({
      id: uid(), name: update.brandName, stage: stageMap[update.suggestedStage] ?? 0,
      notes: update.dealSummary + (update.nextSteps ? '\nNext: ' + update.nextSteps : ''),
      monthlyValue: update.monthlyValue || 0, type: 'deal', contacts: [], lastContact: null, nextAction: ''
    });
    addXP(10, 'New Pipeline Deal: ' + update.brandName);
  }

  // Add action items to inbox
  if (update.actionItems) {
    update.actionItems.filter(a => a.owner === 'Sev').forEach(a => {
      const exists = state.inbox.find(i => i.text.includes(a.task));
      if (!exists) state.inbox.push({ id: uid(), text: update.brandName + ': ' + a.task, added: new Date().toISOString() });
    });
  }

  save(); render();
}

// Find matching deal for an email sender
function findDealForSender(fromEmail) {
  const senderEmail = (fromEmail.match(/<([^>]+)>/) || [])[1] || fromEmail.toLowerCase().trim();
  const senderDomain = senderEmail.split('@')[1];
  // Check clientEmailMap first (fast lookup)
  if (state.clientEmailMap && state.clientEmailMap[senderEmail]) {
    return state.clientEmailMap[senderEmail];
  }
  // Check deal contacts
  for (const opp of state.opportunities) {
    if (!opp.contacts || !opp.contacts.length) continue;
    for (const c of opp.contacts) {
      if (c === senderEmail) return opp.id;
      if (senderDomain && c.split('@')[1] === senderDomain) return opp.id;
    }
  }
  return null;
}

function renderGmail() {

  // management panel are computed during this call.

  h += '</div>';

  if (gmailLoading && !gmailData) {
    h += '<div class="card" style="text-align:center;padding:40px"><div style="font-size:24px;margin-bottom:8px">⏳</div><div class="dim">Fetching your briefing...</div></div>';

    h += '<div class="flex-center gap-8 mb-8"><span style="font-size:16px">🎙️</span>';
    h += '<span style="font-weight:700;color:var(--gold)">Meeting Intelligence</span>';
    h += '<span class="dim" style="font-size:11px">' + gmailData.dealUpdates.length + '</span></div>';
    gmailData.dealUpdates.forEach((update, idx) => {
      const isDeal = true;
      const existingDeal = state.opportunities.find(o =>
        o.name.toLowerCase().includes(update.brandName.toLowerCase()) ||
        update.brandName.toLowerCase().includes(o.name.toLowerCase())
      );
      h += '<div class="inner-card mb-8" style="padding:10px">';
      h += '<div style="font-weight:600;font-size:13px;color:var(--gold)">' + esc(update.brandName) + '</div>';

      h += '<div style="font-size:12px;margin-top:4px;color:var(--text)">' + esc(update.dealSummary || '') + '</div>';
      if (update.actionItems && update.actionItems.length > 0) {
        h += '<div style="margin-top:6px;font-size:11px">';

          const ownerColor = a.owner === 'Sev' ? 'var(--yellow)' : 'var(--cyan)';

        h += '<div style="font-size:12px;margin-top:4px;color:var(--text)">' + esc(insight.topicsSummary || '') + '</div>';
        if (insight.fathomUrl) h += '<div style="margin-top:6px"><button class="btn-ghost btn-sm" onclick="window.open(\'' + esc(insight.fathomUrl) + '\',\'_blank\')">View Call</button></div>';
        h += '</div>';
      });
      if (gmailData.pendingKnowledgeHub > 0) {
        h += '<div class="dim" style="font-size:11px;text-align:center;padding:4px">' + gmailData.pendingKnowledgeHub + ' call(s) pending Knowledge Hub push (needs GitHub token)</div>';
      }
      h += '</div>';
    }
  }

  // Client Activity section - emails from known deal contacts
  const clientActivityEmails = [];
  const dismissed = state.dismissedEmails || [];
  if (gmailData.emails) {
    Object.values(gmailData.emails).flat().forEach(function(email) {
      if (dismissed.includes(email.threadId)) return;
      const dealId = findDealForSender(email.from);
      if (dealId) {
        const deal = state.opportunities.find(o => o.id === dealId);
        if (deal) {
          clientActivityEmails.push({ email: email, deal: deal });
        }
      }
    });
  }
  if (clientActivityEmails.length > 0) {
    // Group by deal
    const byDeal = {};
    clientActivityEmails.forEach(function(item) {
      if (!byDeal[item.deal.id]) byDeal[item.deal.id] = { deal: item.deal, emails: [] };
      byDeal[item.deal.id].emails.push(item.email);
    });
    h += '<div class="card" style="border-color:rgba(6,182,212,0.3)">';
    h += '<div class="flex-center gap-8 mb-8"><span style="font-size:16px">🔗</span>';
    h += '<span style="font-weight:700;color:var(--cyan)">Client Activity</span>';
    h += '<span class="dim" style="font-size:11px">' + clientActivityEmails.length + ' emails from linked deals</span></div>';
    Object.values(byDeal).forEach(function(group) {
      const health = getHealthStatus(group.deal.lastContact);
      h += '<div class="inner-card mb-8" style="padding:10px">';
      h += '<div class="flex-center gap-8 mb-4">';
      h += '<span class="health-dot" style="background:' + health.color + '"></span>';

        h += '</div></div>';
        h += '<div class="dim" style="font-size:11px">' + esc(fromName) + '</div>';
        h += '</div>';
      });
      h += '</div>';
    });
    h += '</div>';
  }

  // Render each category (priority order)
  const order = ['CMD/Opportunities', 'CMD/Actions', 'CMD/Client Updates', 'CMD/Finance', 'CMD/Admin', 'CMD/Noise'];
  let noiseCollapsed = true;

  order.forEach(cat => {
    const allItems = gmailData.emails[cat] || [];
    const items = allItems.filter(e => !dismissed.includes(e.threadId));
    const meta = GMAIL_CATEGORIES[cat];
    if (!meta) return;

    const isNoise = cat === 'CMD/Noise';
    const isEmpty = items.length === 0;
    const showLinkBtn = (cat === 'CMD/Opportunities' || cat === 'CMD/Client Updates');

    h += '<div class="card' + (isEmpty ? '' : '') + '" style="' + (isEmpty ? 'opacity:0.5' : '') + '">';
    h += '<div class="flex-between mb-8" ' + (isNoise && items.length > 0 ? 'onclick="document.getElementById(\'noise-list\').classList.toggle(\'hidden\')" style="cursor:pointer"' : '') + '>';
    h += '<div class="flex-center gap-8"><span style="font-size:16px">' + meta.icon + '</span>';
    h += '<div><span style="font-weight:700;color:' + meta.color + '">' + meta.label + '</span>';
    h += '<span class="dim" style="font-size:11px;margin-left:8px">' + items.length + '</span></div></div>';
    if (isNoise && items.length > 0) h += '<span class="dim" style="font-size:11px">tap to expand</span>';
    h += '</div>';

    if (isEmpty) {
      h += '<div class="dim" style="font-size:12px;padding:4px 0">Nothing here — all clear.</div>';
    } else {
      h += '<div ' + (isNoise ? 'id="noise-list" class="hidden"' : '') + '>';
      items.forEach(email => {
        const fromName = email.from.split('<')[0].trim().replace(/"/g, '');
        h += '<div class="inner-card mb-8" style="padding:10px">';
        h += '<div class="flex-between">';
        h += '<div style="flex:1;min-width:0">';
        h += '<div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(email.subject) + '</div>';
        h += '<div class="dim" style="font-size:11px">' + esc(fromName) + ' · ' + gmailTimeAgo(email.date) + '</div>';
        if (email.reason) h += '<div style="font-size:11px;color:' + meta.color + ';margin-top:2px;opacity:0.8">' + esc(email.reason) + '</div>';
        h += '</div>';
        h += '<div class="flex gap-4" style="margin-left:8px;flex-shrink:0;align-items:center">';
        h += '<button class="btn-ghost btn-sm" onclick="gmailOpenThread(\'' + esc(email.threadId) + '\')" title="Open in Gmail">Open</button>';
        if (!isNoise) h += '<button class="btn-ghost btn-sm" onclick="gmailSendToInbox(\'' + esc(email.subject.replace(/'/g, "\\'")) + '\',\'' + esc(fromName.replace(/'/g, "\\'")) + '\')" title="Add to GTD Inbox">→ Inbox</button>';
        if (cat === 'CMD/Opportunities') h += '<button class="btn-ghost btn-sm" style="color:var(--green);border-color:rgba(34,197,94,0.3)" onclick="gmailAddToPipeline(\'' + esc(email.subject.replace(/'/g, "\\'")) + '\',\'' + esc(email.from.replace(/'/g, "\\'")) + '\')" title="Add to Deals pipeline">→ Pipeline</button>';
        if (showLinkBtn) h += '<button class="btn-ghost btn-sm" style="color:var(--cyan);border-color:rgba(6,182,212,0.3);font-size:10px" onclick="showLinkToDealPicker(\'' + esc(email.from.replace(/'/g, "\\'")) + '\')" title="Link sender to a deal">🔗 Deal</button>';
        // Junk: one-click learning rule + best-effort mark-as-read in Gmail.
        // Hide on Noise (already-junked) since the rule already moved it here.
        if (!isNoise) h += '<button class="btn-ghost btn-sm" style="color:var(--orange);border-color:rgba(249,115,22,0.3);font-size:10px" onclick="event.stopPropagation();gmailMarkJunk(\'' + esc(email.threadId) + '\',\'' + esc((email.subject||'').replace(/'/g, "\\'")) + '\',\'' + esc((email.from||'').replace(/'/g, "\\'")) + '\')" title="Junk: create rule + reroute similar emails to Noise">🚫 Junk</button>';
        h += '<button class="dismiss-btn" onclick="event.stopPropagation();dismissEmail(\'' + esc(email.threadId) + '\')" title="Dismiss this one (no rule)">✕</button>';
        h += '</div></div></div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  // Email rules management (collapsible) — sits above the time filter so
  // it's always findable but doesn't dominate when you're skimming the briefing.
  h += renderEmailRulesSection();

  // Time filter buttons
  h += '<div class="card" style="text-align:center">';
  h += '<div class="dim mb-8" style="font-size:11px">Time range</div>';
  h += '<div class="flex-center gap-8" style="justify-content:center">';
  h += '<button class="btn-ghost btn-sm" onclick="fetchGmailBriefing(6)">6h</button>';
  h += '<button class="btn-ghost btn-sm" onclick="fetchGmailBriefing(12)">12h</button>';
  h += '<button class="btn-ghost btn-sm" onclick="fetchGmailBriefing(24)">24h</button>';
  h += '<button class="btn-ghost btn-sm" onclick="fetchGmailBriefing(48)">48h</button>';
  h += '<button class="btn-ghost btn-sm" onclick="fetchGmailBriefing(168)">7d</button>';
  h += '</div></div>';

  return h;
}

// ===== RENDER =====
function render() {
  const c = computed(), lv = getLevel(state.xp), nlv = getNextLevel(state.xp);
  document.getElementById("header-week").textContent = "Week " + getWeekId() + " | Attention to Sales";
  document.getElementById("header-level").textContent = lv.name;
  document.getElementById("header-xp").textContent = state.xp.toLocaleString() + " XP";

  // Tabs
  let tabsH = "";
  TAB_LIST.forEach(t => {
    let badge = "";
    if (t.id === "inbox") {
      const inboxCount = state.inbox.length;
      const unmatchedCount = (state.unmatchedMeetings || []).length;
      const total = inboxCount + unmatchedCount;
      if (total > 0) badge = '<span class="badge"' + (unmatchedCount > 0 ? ' style="background:var(--orange)"' : '') + '>'+total+'</span>';
    }
    if (t.id === "gmail" && gmailData) {
      const dismissed = state.dismissedEmails || [];
      const ac = (gmailData.emails['CMD/Opportunities']||[]).filter(e => !dismissed.includes(e.threadId)).length + (gmailData.emails['CMD/Actions']||[]).filter(e => !dismissed.includes(e.threadId)).length;
      if (ac > 0) badge = '<span class="badge" style="background:var(--gold)">'+ac+'</span>';
    }
    if (t.id === "knowledge") {
      const kc = (state.knowledgeBase || []).length;
      if (kc > 0) badge = '<span class="badge" style="background:var(--cyan)">'+kc+'</span>';
    }
    tabsH += '<button class="tab'+(currentTab===t.id?" active":"")+'" onclick="switchTab(\''+t.id+'\')">'+t.label+badge+'</button>';
  });
  document.getElementById("tabs").innerHTML = tabsH;

  // Content
  const el = document.getElementById("content");
  switch(currentTab) {
    case "dashboard": el.innerHTML = renderDashboard(c, lv, nlv); break;
    case "projects": el.innerHTML = renderProjects(); break;
    case "opportunities": el.innerHTML = renderOpportunities(); break;
    case "sessions": el.innerHTML = renderSessions(c); break;
    case "commissions": el.innerHTML = renderCommissions(c); break;
    case "actions": el.innerHTML = renderActions(c); break;
    case "habits": el.innerHTML = renderHabits(); break;
    case "inbox": el.innerHTML = renderInbox(); break;
    case "someday": el.innerHTML = renderSomeday(); break;
    case "review": el.innerHTML = renderReview(c); break;
    case "debrief": el.innerHTML = renderDebrief(); break;
    case "gmail": el.innerHTML = renderGmail(); break;
    case "knowledge": el.innerHTML = renderKnowledge(); break;
    case "history": el.innerHTML = renderHistory(); break;
  }
}

function switchTab(id) { currentTab = id; render(); }

// ===== DASHBOARD =====
function renderDashboard(c, lv, nlv) {
  const lvPct = nlv ? ((state.xp - lv.xp) / (nlv.xp - lv.xp)) * 100 : 100;
  const scoreCol = c.score >= 80 ? "var(--green)" : c.score >= 50 ? "var(--yellow)" : "var(--red)";

  // Client health summary
  let clientHealthHTML = '';
  if (c.activeClients > 0) {
    clientHealthHTML = '<div class="flex-center gap-4 dim">Clients: ';
    if (c.clientsGreen > 0) clientHealthHTML += '<span style="color:var(--green);font-weight:600">' + c.clientsGreen + '●</span>';
    if (c.clientsYellow > 0) clientHealthHTML += '<span style="color:var(--yellow);font-weight:600;margin-left:4px">' + c.clientsYellow + '●</span>';
    if (c.clientsRed > 0) clientHealthHTML += '<span style="color:var(--red);font-weight:600;margin-left:4px">' + c.clientsRed + '●</span>';
    clientHealthHTML += '</div>';
  }

  return `
    <div class="card card-accent">
      <div class="flex-between mb-8">
        <div><span class="gold" style="font-weight:800;font-size:20px">${esc(lv.name)}</span><span class="dim" style="margin-left:12px;font-size:12px">LVL ${LEVELS.indexOf(lv)+1}</span></div>
        <div style="text-align:right"><span class="gold" style="font-weight:700">${state.xp.toLocaleString()} XP</span>${nlv?'<span class="dim" style="font-size:12px;margin-left:8px">/ '+nlv.xp.toLocaleString()+'</span>':''}</div>
      </div>
      ${progressHTML(lvPct, "var(--gold)")}
      <div class="flex gap-12 mt-8" style="flex-wrap:wrap">
        <div class="flex-center gap-4 dim"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${state.streak>=7?'var(--yellow)':'var(--dim)'}" stroke-width="2"><path d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg><span style="font-weight:600;color:${state.streak>=7?'var(--yellow)':'var(--dim)'}">${state.streak} day streak</span></div>
        <div class="flex-center gap-4 dim">Week: <b style="color:${scoreCol}">${c.score}%</b></div>
        ${clientHealthHTML}
      </div>
    </div>
    <div class="grid-stats">
      ${[{l:"Confirmed /mo",v:"$"+c.confirmed.toLocaleString(),c:"var(--green)"},{l:"Pipeline /mo",v:"$"+c.pipeline.toLocaleString(),c:"var(--yellow)"},{l:"Projects Rev /mo",v:"$"+c.projectsRevenue.toLocaleString(),c:"var(--cyan)"},{l:"Clients: "+c.activeClients+" active",v:c.activeClients,c:"var(--cyan)"},{l:"Commissions /mo",v:"$"+Math.round(c.commMonthly).toLocaleString(),c:"var(--purple)"},{l:"Sessions Left",v:c.sesLeft,c:"var(--cyan)"},{l:"Actions",v:c.doneActs+"/"+c.allActs.length,c:"var(--gold)"},{l:"Inbox",v:state.inbox.length,c:state.inbox.length>5?"var(--red)":"var(--green)"}].map(s=>'<div class="card stat-card"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>').join("")}
    </div>
    <div class="card">
      <div class="label">Client Health</div>
      ${state.opportunities.filter(o=>o.stage===5).length === 0 ? '<div class="dim" style="font-size:12px">No active clients (stage 5) yet.</div>' : state.opportunities.filter(o=>o.stage===5).map(o => {
        const h = getHealthStatus(o.lastContact);
        return '<div class="flex-center gap-8 section-divider" style="padding:6px 0"><span class="health-dot" style="background:'+h.color+'"></span><span style="font-weight:500">'+esc(o.name)+'</span><span class="dim" style="font-size:11px;margin-left:auto">'+h.label+'</span></div>';
      }).join("")}
    </div>
    <div class="card">
      <div class="label">Quick Capture (GTD Inbox)</div>
      <div class="flex gap-8">
        <input class="input flex-1" id="dash-inbox" placeholder="What's on your mind? Get it out of your head..." onkeydown="if(event.key==='Enter')dashCapture()">
        <button class="btn" onclick="dashCapture()">Capture</button>
      </div>
    </div>
    <div class="card">
      <div class="label">This Week's Actions</div>
      ${c.allActs.length===0?'<div class="dim">No actions set. Go to Actions tab.</div>':c.allActs.slice(0,8).map((a,i)=>{
        const opp = state.opportunities.find(o=>o.id===a.oppId);
        return '<div class="flex-center gap-10 section-divider">'+checkboxHTML(a.done,"toggleAction('"+esc(a.oppId)+"','"+esc(a.id)+"')")+'<div style="flex:1;'+(a.done?'text-decoration:line-through;opacity:0.5':'')+'"><div>'+esc(a.text)+'</div><div class="dim" style="font-size:11px">'+(opp?esc(opp.name):'')+'</div></div></div>';
      }).join("")}
    </div>

function addProjectUpdate(id) {

function renderOppEditPanel(opp) {
  let h = '';
  h += '<div id="edit-'+opp.id+'" class="hidden" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">';
  h += '<textarea class="input mb-8" rows="2" onchange="updateOppNotes(\''+opp.id+'\',this.value)">'+esc(opp.notes)+'</textarea>';
  h += '<div class="flex gap-8 flex-wrap"><select class="select" onchange="updateOppStage(\''+opp.id+'\',+this.value)">'+STAGES.map((s,i)=>'<option value="'+i+'"'+(i===opp.stage?' selected':'')+'>'+s+'</option>').join("")+'</select>';
  h += '<input class="input" type="number" style="width:120px" value="'+(opp.monthlyValue||'')+'" placeholder="$/mo" onchange="updateOppVal(\''+opp.id+'\',+this.value)">';
  h += '<button class="btn-ghost btn-danger" onclick="removeOpp(\''+opp.id+'\')">Remove</button></div></div>';
  return h;
}

function getRecentClientEmails(opp) {
  if (!gmailData || !gmailData.emails || !opp.contacts || !opp.contacts.length) return [];
  const emails = [];
  Object.values(gmailData.emails).flat().forEach(function(email) {
    const senderEmail = (email.from.match(/<([^>]+)>/) || [])[1] || email.from.toLowerCase().trim();
    const senderDomain = senderEmail.split('@')[1];
    for (const c of opp.contacts) {
      if (c === senderEmail || (senderDomain && c.split('@')[1] === senderDomain)) {
        emails.push(email);
        break;
      }
    }
  });
  emails.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  return emails;
}

function updateDealNextAction(id, value) {
  const opp = state.opportunities.find(o => o.id === id);
  if (!opp) return;
  opp.nextAction = value;
  save();
}

function addDealNote(id) {
  const opp = state.opportunities.find(o => o.id === id);
  if (!opp) return;
  const note = prompt("Add note for " + opp.name + ":");
  if (note !== null && note.trim()) {
    opp.notes = (opp.notes ? opp.notes + '\n' : '') + '[' + new Date().toISOString().slice(0,10) + '] ' + note.trim();
    save(); render();
  }
}

function manageDealContacts(id) {
  const opp = state.opportunities.find(o => o.id === id);
  if (!opp) return;
  if (!opp.contacts) opp.contacts = [];
  const current = opp.contacts.length ? opp.contacts.join(', ') : '(none)';
  const input = prompt("Contacts for " + opp.name + ":\nCurrent: " + current + "\n\nAdd email address (or leave blank):");
  if (input !== null && input.trim()) {
    const email = input.trim().toLowerCase();
    if (!opp.contacts.includes(email)) {
      opp.contacts.push(email);
      if (!state.clientEmailMap) state.clientEmailMap = {};
      state.clientEmailMap[email] = opp.id;
    }
    save(); render();
  }
}

// ===== FATHOM INTEGRATION (UI helpers + renderers) =====
// All Fathom data is written into Firebase by the Vercel webhook function.
// This block is purely render/edit logic for the data already on state.

function meetingTimeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d.getTime())) return '';
  const ms = Date.now() - d.getTime();
  const min = Math.floor(ms/60000); const hr = Math.floor(min/60); const day = Math.floor(hr/24);
  if (min < 60) return min + 'm ago';
  if (hr < 24) return hr + 'h ago';
  if (day < 7) return day + 'd ago';
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
}

function meetingsSorted(meetings) {
  return (meetings || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
}

/** Pull the latest meeting whose suggestedStage advances past the opp's current stage. */
/**
 * Fathom auto-titles many recordings as "Impromptu Zoom Meeting" or similar
 * generic strings. To make scanning the Knowledge Hub possible at a glance,
 * we infer a short hint (other-party name) from attendees → action item
 * assignees → summary, and append it. Storage stays untouched (still the
 * original Fathom title); this is render-only.
 */
function smartMeetingTitle(m) {
  if (!m || !m.title) return 'Untitled';
  const t = String(m.title).trim();

  // Patterns Fathom uses when no real meeting title was set.
  const isGeneric =
    /^impromptu\b/i.test(t) ||                                // Impromptu Zoom/Google Meet/etc Meeting
    /^(catch.?up|coffee with|meeting w\/?|sev[' ]?s? zoom)\s*sev?$/i.test(t) ||
    /^untitled/i.test(t) ||
    /^new\s+meeting/i.test(t);

  if (!isGeneric) return t;

  const hint = inferMeetingHint(m);
  if (!hint) return t;

  // Strip the boring "Meeting" suffix to keep the prefix tight.
  const tag = t.replace(/\s*Meeting\s*$/i, '').trim();
  return hint + ' (' + tag + ')';
}

function inferMeetingHint(m) {
  const isSev = (s) => /\bsev(a|o)?\b|\bseva\s+mozhaev\b/i.test(s || '');

  // 1. External attendees with a real name (live webhook payloads).
  const att = (m.attendees || [])
    .filter(a => a && a.isExternal && (a.name || '').trim())
    .map(a => a.name.trim())
    .filter(n => !isSev(n));
  if (att.length) return att.slice(0, 2).join(', ');

  // 2. Action item assignees that aren't Sev (rich for backfilled data).
  const owners = Array.from(new Set(
    (m.actionItems || [])
      .map(a => (a && a.owner || '').trim())
      .filter(o => o && !isSev(o))
  ));
  if (owners.length) return owners.slice(0, 2).join(', ');

  // 3. First proper noun in the summary's "Meeting Purpose" line.
  const summary = m.summary || '';
  if (summary) {
    const purposeBlock = summary.match(/##?\s*Meeting Purpose[\s\S]{0,400}/i);
    const haystack = (purposeBlock ? purposeBlock[0] : summary).slice(0, 600);
    // Skip common boilerplate words that can start with a capital.
    const STOP = /^(Meeting|Purpose|Key|Takeaways|To|For|The|This|It|Sev|Seva|Sevo|And|A|An|We|Our|Their|Was|With|From)$/;
    const candidates = haystack.match(/\b[A-Z][a-z]{2,}(?:\s+[A-Z][a-z]+)?\b/g) || [];
    for (const c of candidates) {
      const first = c.split(/\s+/)[0];
      if (!STOP.test(first) && !isSev(c)) return c;
    }
  }
  return null;
}

function latestStageSuggestion(opp) {
  if (!opp.meetings || !opp.meetings.length) return null;
  const sorted = meetingsSorted(opp.meetings);
  for (const m of sorted) {
    if (m.suggestionApplied) continue;
    if (!m.suggestedStage) continue;
    const idx = STAGES.indexOf(m.suggestedStage);
    if (idx > opp.stage) return { meeting: m, stageIndex: idx, stageName: m.suggestedStage };
  }
  return null;
}

function renderStageSuggestionBadge(opp) {
  const sug = latestStageSuggestion(opp);
  if (!sug) return '';
  return '<div class="flex-center gap-8 mt-8" style="padding:8px;background:rgba(201,162,39,0.1);border:1px dashed var(--gold-dim);border-radius:6px" onclick="event.stopPropagation()">' +
    '<span style="font-size:11px;color:var(--gold);font-weight:600">FATHOM SUGGESTS</span>' +
    '<span style="font-size:12px;flex:1">Move to <b>' + esc(sug.stageName) + '</b> based on "' + esc(sug.meeting.title) + '"</span>' +
    '<button class="btn-ghost btn-sm" onclick="applyMeetingStageSuggestion(\''+opp.id+'\',\''+esc(sug.meeting.fathomId)+'\')">Apply</button>' +
    '<button class="btn-ghost btn-sm dim" onclick="dismissMeetingStageSuggestion(\''+opp.id+'\',\''+esc(sug.meeting.fathomId)+'\')">Dismiss</button>' +
    '</div>';
}

function applyMeetingStageSuggestion(oppId, fathomId) {
  const opp = state.opportunities.find(o => o.id === oppId); if (!opp) return;
  const m = (opp.meetings || []).find(x => x.fathomId === fathomId); if (!m || !m.suggestedStage) return;
  const idx = STAGES.indexOf(m.suggestedStage); if (idx < 0) return;
  if (idx > opp.stage) addXP(XP_VALUES.deal_advance, "Deal Advanced");
  if (idx >= 4 && opp.stage < 4) addXP(XP_VALUES.deal_close, "DEAL CLOSED!");
  opp.stage = idx;
  m.suggestionApplied = true;
  save(); render();
}

function dismissMeetingStageSuggestion(oppId, fathomId) {
  const opp = state.opportunities.find(o => o.id === oppId); if (!opp) return;
  const m = (opp.meetings || []).find(x => x.fathomId === fathomId); if (!m) return;
  m.suggestionApplied = true;
  save(); render();
}

function updateUnmatchedNotes(idx, value) {
  if (!state.unmatchedMeetings || !state.unmatchedMeetings[idx]) return;
  state.unmatchedMeetings[idx].manualNotes = value;
  save();
}

function assignUnmatchedMeeting(idx, oppId) {
  if (!oppId) { alert('Pick a client from the dropdown first.'); return; }
  const items = state.unmatchedMeetings || []; if (!items[idx]) return;
  const opp = state.opportunities.find(o => o.id === oppId); if (!opp) return;
  const m = items[idx];
  // Strip the unmatched-only fields; keep everything else as the meeting record.
  const record = Object.assign({}, m);
  delete record.suggestedClientName;
  // Append manual notes into summary so they don't get lost.
  if (m.manualNotes) record.summary = (record.summary ? record.summary + '\n\n' : '') + '[Manual notes] ' + m.manualNotes;
  delete record.manualNotes;
  if (!opp.meetings) opp.meetings = [];
  if (!opp.meetings.some(x => x.fathomId === record.fathomId)) opp.meetings.unshift(record);
  // Update lastContact if newer
  if (!opp.lastContact || new Date(record.date) > new Date(opp.lastContact)) opp.lastContact = record.date;
  // Add the meeting attendees as opportunity contacts so future meetings auto-match.
  (record.attendees || []).filter(a => a.isExternal).forEach(a => {
    if (!opp.contacts) opp.contacts = [];
    if (!opp.contacts.includes(a.email)) opp.contacts.push(a.email);
    if (!state.clientEmailMap) state.clientEmailMap = {};
    state.clientEmailMap[a.email] = opp.id;
  });
  state.unmatchedMeetings.splice(idx, 1);
  addXP(XP_VALUES.action, 'Meeting assigned');
  save(); render();
}

function moveUnmatchedToKnowledge(idx) {
  const items = state.unmatchedMeetings || []; if (!items[idx]) return;
  const m = items[idx];
  const entry = Object.assign({}, m, { type: 'other', knowledgeEntries: [] });
  delete entry.suggestedClientName; delete entry.manualNotes;
  if (!state.knowledgeBase) state.knowledgeBase = [];
  if (!state.knowledgeBase.some(k => k.fathomId === entry.fathomId)) state.knowledgeBase.unshift(entry);
  state.unmatchedMeetings.splice(idx, 1);
  save(); render();
}

function dismissUnmatchedMeeting(idx) {
  if (!confirm('Dismiss this meeting? It won\'t be filed anywhere.')) return;
  state.unmatchedMeetings.splice(idx, 1);
  save(); render();
}

// ===== KNOWLEDGE HUB =====
let knowledgeFilter = '';
function renderKnowledge() {
  const items = (state.knowledgeBase || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const meta = state.fathomMeta || {};
  let h = '<h3 class="mb-4">Knowledge Hub</h3>';
  h += '<p class="dim mb-12" style="font-size:13px">Searchable archive of advisory, internal, and training meetings. Per-client meetings live on each client card.</p>';

  // Sync status
  if (meta.lastWebhookAt) {
    h += '<div class="dim mb-12" style="font-size:11px">Last Fathom sync: ' + meetingTimeAgo(meta.lastWebhookAt) + '</div>';
  }

  // Search box
  h += '<div class="card mb-12"><input class="input" id="kb-search" placeholder="Search title, summary, attendees, topics…" value="'+esc(knowledgeFilter)+'" oninput="knowledgeFilter=this.value;render()"></div>';

  if (!items.length) {
    h += '<div class="text-center dim" style="padding:40px">No knowledge entries yet. Advisory and internal meetings will appear here automatically when Fathom syncs them.</div>';
    return h;
  }

  const q = knowledgeFilter.trim().toLowerCase();
  const filtered = q ? items.filter(m => {
    const hay = [
      m.title, m.summary, m.transcript,
      (m.topics || []).join(' '), (m.tags || []).join(' '),
      (m.attendees || []).map(a => (a.name||'') + ' ' + (a.email||'')).join(' '),
    ].join(' ').toLowerCase();
    return hay.includes(q);
  }) : items;

  if (q && !filtered.length) {
    h += '<div class="text-center dim" style="padding:40px">No matches for "' + esc(q) + '".</div>';
    return h;
  }

  // Group by month for readability
  const groups = {};
  filtered.forEach(m => {
    const key = new Date(m.date).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
    (groups[key] = groups[key] || []).push(m);
  });
  Object.keys(groups).forEach(monthKey => {
    h += '<div class="mb-12"><div class="label">' + esc(monthKey) + '</div>';
    groups[monthKey].forEach(m => {
      const typeColor = m.type === 'advisory' ? 'var(--cyan)' : m.type === 'training' ? 'var(--purple)' : m.type === 'internal' ? 'var(--gold)' : 'var(--dim)';
      h += '<div class="card" style="border-left:3px solid '+typeColor+'">';
      h += '<div class="flex-between mb-4"><span style="font-weight:600">' + esc(smartMeetingTitle(m)) + '</span>' + tagHTML(m.type || 'other', typeColor) + '</div>';
      h += renderMeetingRow(m, 'kb');
      h += '<div class="flex gap-8 mt-8">';
      h += '<button class="btn-ghost btn-sm" onclick="moveKnowledgeToClient('+ items.indexOf(m) +')">Reassign to client…</button>';
      h += '<button class="btn-ghost btn-sm btn-danger" onclick="deleteKnowledgeEntry('+ items.indexOf(m) +')">Delete</button>';
      h += '</div></div>';
    });
    h += '</div>';
  });

  return h;
}

function moveKnowledgeToClient(idx) {
  const items = (state.knowledgeBase || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const m = items[idx]; if (!m) return;
  const names = state.opportunities.map((o, i) => (i + 1) + '. ' + o.name).join('\n');
  const pick = prompt('Reassign "' + m.title + '" to which client?\n\n' + names + '\n\nEnter number:');
  if (pick === null) return;
  const oppIdx = parseInt(pick) - 1;
  const opp = state.opportunities[oppIdx]; if (!opp) return;
  if (!opp.meetings) opp.meetings = [];
  if (!opp.meetings.some(x => x.fathomId === m.fathomId)) opp.meetings.unshift(m);
  state.knowledgeBase = state.knowledgeBase.filter(k => k.fathomId !== m.fathomId);
  if (!opp.lastContact || new Date(m.date) > new Date(opp.lastContact)) opp.lastContact = m.date;
  save(); render();
}

function deleteKnowledgeEntry(idx) {
  const items = (state.knowledgeBase || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const m = items[idx]; if (!m) return;
  if (!confirm('Delete "' + m.title + '" from the Knowledge Hub?')) return;
  state.knowledgeBase = state.knowledgeBase.filter(k => k.fathomId !== m.fathomId);
  save(); render();
}

    h += '</div>';
  });
  return h;
}

// ===== INIT =====
async function initApp() {
  const lock = document.getElementById('lock-screen');
  const pinInput = document.getElementById('pin-input');
  const pinBtn = document.getElementById('pin-btn');
  const pinError = document.getElementById('pin-error');

  // Wire up project category change listener after render
  document.addEventListener('change', function(e) {
    if (e.target && e.target.id === 'proj-cat') projCatChange();
  });

  // Auto-login on browser refresh if session is still active
  const savedVault = sessionStorage.getItem('sev-vault');
  if (savedVault) {
    vaultPath = savedVault;
    try {
      const found = await loadFromFirebase();
      if (found) {
        lock.classList.add('hidden');
        render();
        checkAutoBackup();
        return;
      }
    } catch(e) { console.warn('Auto-login failed, showing PIN screen'); }
    sessionStorage.removeItem('sev-vault');
    vaultPath = null;
  }
  // No saved session — show lock screen
  lock.style.opacity = '1';

  pinBtn.onclick = async () => {
    const pin = pinInput.value;
    if (pin.length < 4) { pinError.textContent = 'At least 4 characters'; return; }
    pinError.textContent = '';
    pinBtn.textContent = 'Loading...';
    pinBtn.disabled = true;

    try {
      const hash = await hashPIN(pin);
      const OWNER_HASH = '869c1d77870789124ccd0c348d5d6bd9bf0c019836a53ebce6cd6ea3551b1702';
      if (hash !== OWNER_HASH) {
        pinError.textContent = 'Wrong PIN.';
        pinInput.value = '';
        pinBtn.textContent = 'Unlock';
        pinBtn.disabled = false;
        return;
      }
      vaultPath = 'vaults/' + hash;
      sessionStorage.setItem('sev-vault', vaultPath);
      const found = await loadFromFirebase();

      if (found) {
        lock.classList.add('hidden');
        trackStreak(); save(); render();
        checkAutoBackup();
      } else {
        pinError.textContent = 'Wrong PIN.';
        pinInput.value = '';
        pinBtn.textContent = 'Unlock';
        pinBtn.disabled = false;
      }
    } catch(e) {
      console.error(e);
      pinError.textContent = 'Connection error. Try again.';
      pinBtn.textContent = 'Unlock';
      pinBtn.disabled = false;
    }
  };

  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') pinBtn.click(); });
  pinInput.focus();
}

// ===== PULL TO REFRESH (mobile) =====
(function() {
  const THRESHOLD = 80;
  let startY = 0, pulling = false, pullDist = 0;
  const indicator = document.getElementById('pull-indicator');
  const pullText = document.getElementById('pull-text');

  document.addEventListener('touchstart', function(e) {
    if (document.getElementById('lock-screen').classList.contains('hidden') && window.scrollY <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      pullDist = 0;
      indicator.classList.remove('releasing', 'loading');
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) { pullDist = 0; indicator.style.height = '0px'; return; }
    if (dy > 10) e.preventDefault();
    pullDist = Math.min(dy * 0.5, 120);
    indicator.style.height = pullDist + 'px';
    if (pullDist >= THRESHOLD) {
      pullText.textContent = '↑ Release to refresh';
      pullText.classList.add('visible');
    } else if (pullDist > 20) {
      pullText.textContent = '↓ Pull to refresh';
      pullText.classList.add('visible');
    } else {
      pullText.classList.remove('visible');
    }
  }, { passive: false });

  document.addEventListener('touchend', async function() {
    if (!pulling) return;
    pulling = false;
    if (pullDist >= THRESHOLD && vaultPath) {
      indicator.classList.add('loading');
      indicator.style.height = '50px';
      try {
        await loadFromFirebase();
        render();
      } catch(e) { console.error('Refresh failed', e); }
      setTimeout(() => {
        indicator.classList.add('releasing');
        indicator.style.height = '0px';
        setTimeout(() => indicator.classList.remove('releasing', 'loading'), 300);
      }, 400);
    } else {
      indicator.classList.add('releasing');
      indicator.style.height = '0px';
      setTimeout(() => indicator.classList.remove('releasing'), 300);
    }
  }, { passive: true });
})();
